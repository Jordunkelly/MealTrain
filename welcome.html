<style>

    --ev:#f48fb1;--el:#7ad0ff;--gold:#ffe27a;--green:#7ae8b0;
    --txt:#e8f0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Press Start 2P',monospace;color:var(--txt);
    background:radial-gradient(circle at 50% 0%,#16205a 0%,var(--bg) 70%);
    min-height:100%;display:flex;flex-direction:column;align-items:center;
    padding:24px 14px 60px;image-rendering:pixelated;overflow-x:hidden}

  /* twinkle starfield */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;width:3px;height:3px;background:#fff;animation:tw 1.8s steps(2) infinite}
  @keyframes tw{0%,100%{opacity:1}50%{opacity:.2}}

  .wrap{position:relative;z-index:1;width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;gap:22px}

  h1{font-size:clamp(12px,3vw,18px);text-align:center;line-height:1.9;text-shadow:2px 2px 0 #000}
  h1 .ev{color:var(--ev)} h1 .el{color:var(--el)}
  .sub{font-size:8px;color:var(--gold);letter-spacing:2px;text-align:center;margin-top:6px}

  /* hero sprites */
  .heroes{display:flex;gap:48px;align-items:flex-end;justify-content:center}
  .hero{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;
    background:none;border:none;font-family:inherit;color:var(--txt);
    transition:transform .12s}
  .hero:hover{transform:translateY(-4px)}
  .hero:active{transform:translateY(2px)}
  .hero svg{width:84px;height:auto;image-rendering:pixelated}
  .hero .nm{font-size:9px}
  .hero.ev .nm{color:var(--ev)} .hero.el .nm{color:var(--el)}
  .hero .tap{font-size:6px;color:var(--accent);opacity:.7}
  .bob{animation:bob 2.4s ease-in-out infinite}
  .bob2{animation:bob 2.4s ease-in-out infinite .6s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .blink{animation:blink 4s steps(1) infinite}
  @keyframes blink{0%,92%,100%{opacity:1}94%,98%{opacity:0}}
  .pop{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18) rotate(-4deg)}100%{transform:scale(1)}}

  /* speech bubble */
  .bubble{position:relative;background:#fff;color:#1a2240;border:3px solid #1a2240;
    border-radius:8px;padding:10px 12px;font-size:8px;line-height:1.7;max-width:200px;
    opacity:0;transform:translateY(6px);transition:opacity .2s,transform .2s;pointer-events:none}
  .bubble.show{opacity:1;transform:translateY(0)}
  .bubble:after{content:"";position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:#1a2240}

  /* dialogue / dice panel */
  .panel{width:100%;background:var(--panel);border:4px solid var(--ink-line);
    box-shadow:inset 0 0 0 2px var(--accent);padding:20px 18px;border-radius:4px}
  .questline{font-size:9px;color:var(--gold);text-align:center;margin-bottom:14px;line-height:1.8}

  .fact{font-size:9px;line-height:2;color:var(--accent2);text-align:center;min-height:64px;
    display:flex;align-items:center;justify-content:center;padding:4px 2px}
  .fact .roll{color:var(--gold)}

  .controls{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:8px}
  .die{width:72px;height:72px;cursor:pointer;image-rendering:pixelated;
    transition:transform .1s}
  .die:hover{transform:scale(1.05)}
  .rolling{animation:rollspin .6s steps(8)}
  @keyframes rollspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  .btn{font-family:inherit;font-size:9px;color:#0c1430;background:var(--gold);
    border:3px solid #fff;padding:10px 16px;cursor:pointer;border-radius:4px;
    box-shadow:3px 3px 0 #00000055;transition:transform .08s}
  .btn:hover{background:#fff3b0}
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #00000055}

  .count{font-size:7px;color:var(--accent);opacity:.8}

  @media (prefers-reduced-motion:reduce){
    .star,.bob,.bob2,.blink,.rolling,.pop{animation:none}}
</style>

    var fact = document.getElementById('fact');
    var die = document.getElementById('die');
    var rollbtn = document.getElementById('rollbtn');
    var countEl = document.getElementById('count');
    var dots = ['d1','d2','d3','d4','d5'].map(function(id){return document.getElementById(id);});
    var rolls = 0, busy=false, last=-1;

    var pip = {
      1:[2],2:[0,4],3:[0,2,4],4:[0,1,3,4],5:[0,1,2,3,4]
    };
    function showFace(n){
      dots.forEach(function(d,i){ d.style.display = pip[n].indexOf(i)>-1 ? '' : 'none'; });
    }
    showFace(5);

    function pick(arr){
      var i;
      do { i = Math.floor(Math.random()*arr.length); } while(arr.length>1 && i===last);
      last = i; return {i:i,v:arr[i]};
    }

    function roll(){
      if(busy) return; busy=true;
      rolls++; countEl.textContent='Rolls: '+rolls;
      if(!reduce){ die.classList.remove('rolling'); void die.offsetWidth; die.classList.add('rolling'); }
      var flips=0;
      var iv=setInterval(function(){ showFace(1+Math.floor(Math.random()*5)); flips++;
        if(flips>=8){ clearInterval(iv);
          var face=1+Math.floor(Math.random()*5); showFace(face);
          var p=pick(facts);
          fact.innerHTML='<span class="roll">⚄ Rolled '+(p.i+1)+'!</span><br>'+p.v;
          busy=false;
        }
      }, reduce?20:60);
    }
    die.addEventListener('click',roll);
    rollbtn.addEventListener('click',roll);
    die.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();roll();}});
    die.setAttribute('tabindex','0');

    function setupHero(heroId, sprId, bubId, lines){
      var hero=document.getElementById(heroId);
      var spr=document.getElementById(sprId);
      var bub=document.getElementById(bubId);
      var li=-1, t;
      hero.addEventListener('click',function(){
        var p; do{p=Math.floor(Math.random()*lines.length);}while(lines.length>1&&p===li); li=p;
        bub.textContent=lines[p];
        bub.classList.add('show');
        if(!reduce){ spr.classList.remove('pop'); void spr.offsetWidth; spr.classList.add('pop'); }
        clearTimeout(t); t=setTimeout(function(){bub.classList.remove('show');},3200);
      });
    }
    setupHero('hero-ev','spr-ev','bub-ev',evLines);
    setupHero('hero-el','spr-el','bub-el',elLines);
